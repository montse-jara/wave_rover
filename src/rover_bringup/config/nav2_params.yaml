amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: 0.05
    laser_model_type: "likelihood_field"
    max_beams: 40
    max_particles: 1000
    min_particles: 300
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    scan_topic: "/scan"
    set_initial_pose: false
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 0.5
    update_min_a: 0.10
    update_min_d: 0.03
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "/home/ubuntu/maps.yaml"

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.40
      use_astar: false
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 8.0
    odom_topic: "/odometry/filtered"
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.5

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::PoseProgressChecker"
      required_movement_radius: 0.01
      required_movement_angle: 0.08
      movement_time_allowance: 20.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.12
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      desired_linear_vel: 0.08
      min_approach_linear_velocity: 0.03
      approach_velocity_scaling_dist: 0.15

      lookahead_dist: 0.12
      min_lookahead_dist: 0.08
      max_lookahead_dist: 0.16
      # lookahead_time: 1.0
      use_velocity_scaled_lookahead_dist: false

      rotate_to_heading_angular_vel: 1.8
      # this tells robot alignment allowance for path
      # increase for more flexibility
      rotate_to_heading_min_angle: 0.25
      use_rotate_to_heading: true
      max_angular_accel: 3.0
      # transform_tolerance: 0.5

      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 0.08

      use_regulated_linear_velocity_scaling: false
      use_cost_regulated_linear_velocity_scaling: false
      allow_reversing: false

      regulated_linear_scaling_min_radius: 0.10
      regulated_linear_scaling_min_speed: 0.03

   
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      transform_tolerance: 0.6
      initial_transform_timeout: 60.0
      global_frame: "odom"
      robot_base_frame: "base_link"
      update_frequency: 8.0
      publish_frequency: 4.0
      rolling_window: true
      width: 2
      height: 2
      resolution: 0.03
      footprint: "[[0.09, 0.09], [0.09, -0.09], [-0.09, -0.09], [-0.09, 0.09]]"
      footprint_padding: 0.005
      always_send_full_costmap: true
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        tf_filter_tolerance: 0.2
        scan:
          topic: "/scan"
          data_type: "LaserScan"
          clearing: true
          marking: true
          min_obstacle_height: 0.0
          max_obstacle_height: 0.30
          obstacle_max_range: 1.5
          raytrace_max_range: 2.0
          obstacle_min_range: 0.08
          raytrace_min_range: 0.08
          inf_is_valid: false
          observation_persistence: 0.0
          expected_update_rate: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.08
        cost_scaling_factor: 5.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      transform_tolerance: 0.6
      initial_transform_timeout: 60.0
      global_frame: "map"
      robot_base_frame: "base_link"
      update_frequency: 4.0
      publish_frequency: 2.0
      resolution: 0.05
      footprint: "[[0.09, 0.09], [0.09, -0.09], [-0.09, -0.09], [-0.09, 0.09]]"
      footprint_padding: 0.005
      track_unknown_space: true
      always_send_full_costmap: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: "/scan"
          data_type: "LaserScan"
          clearing: true
          marking: true
          min_obstacle_height: 0.0
          max_obstacle_height: 0.30
          obstacle_max_range: 1.5
          raytrace_max_range: 2.0
          obstacle_min_range: 0.08
          raytrace_min_range: 0.08
          inf_is_valid: false
          observation_persistence: 0.0
          expected_update_rate: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.10
        cost_scaling_factor: 4.0

behavior_server:
  ros__parameters:
    use_sim_time: false
    cycle_frequency: 4.0
    local_frame: "odom"
    global_frame: "map"
    robot_base_frame: "base_link"
    local_costmap_topic: "local_costmap/costmap_raw"
    global_costmap_topic: "global_costmap/costmap_raw"
    local_footprint_topic: "local_costmap/published_footprint"
    global_footprint_topic: "global_costmap/published_footprint"
    transform_tolerance: 0.6
    simulate_ahead_time: 0.8
    max_rotational_vel: 0.85
    min_rotational_vel: 0.20
    rotational_acc_lim: 2.5
    behavior_plugins: ["spin", "backup", "wait"]

    spin:
      plugin: "nav2_behaviors::Spin"
      simulate_ahead_time: 0.2
      max_rotational_vel: 1.8
      min_rotational_vel: 1.1
      rotational_acc_lim: 3.0

    backup:
      plugin: "nav2_behaviors::BackUp"

    wait:
      plugin: "nav2_behaviors::Wait"

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: "map"
    robot_base_frame: "base_link"
    odom_topic: "/odometry/filtered"
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    default_bt_xml_filename: "/home/ubuntu/ros2_ws/src/rover_bringup/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    navigators: ["navigate_to_pose", "navigate_through_poses"]

    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"

    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 10
    stop_on_failure: true

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - map_server
      - amcl

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - planner_server
      - controller_server
      - behavior_server
      - bt_navigator
      - waypoint_follower