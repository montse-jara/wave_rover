#AMCL estimates where the robot is on the map using lidar scans odometry and saved map
amcl:
  ros__parameters:
    # False means to use real robot clock and not simulation time
    use_sim_time: false

    # Motion model noise params
    # Higher values means AMCL trust odometry less
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    
    # Robot body frame
    base_frame_id: "base_link"
    # Odometry frame
    odom_frame_id: "odom"
    # Laser scan filtering and matching settings
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    
    # Global map frame
    global_frame_id: "map"
    
    # More filtering and matching settings
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: 0.05
    laser_model_type: "likelihood_field"
    max_beams: 40

    # Particle filter size
    # More particles = better results but more cpu usage
    max_particles: 1000
    min_particles: 300
    pf_err: 0.05
    pf_z: 0.99
    
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    
    #Differential drive model for skid steering robots like waverover
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    
    save_pose_rate: 0.5
    # Lidar topic
    scan_topic: "/scan"
    # Initial pose will be set manually in RViz set to 0, 0, 0 if starting from a base station
    set_initial_pose: false
    
    #Laser sensor probability weights
    sigma_hit: 0.2
    #AMCL publishes map and odom transforms
    tf_broadcast: true
    transform_tolerance: 0.5
    # More probability weights
    update_min_a: 0.10
    update_min_d: 0.03
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
# Map server loads saved occupancy grid map used for localization and planning
map_server:
  ros__parameters:
    use_sim_time: false
    #Path to saved map YAML file
    yaml_filename: "/home/ubuntu/maps.yaml"

# Global planner used to compute path from robots current pose to goal
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    
    planner_plugins: ["GridBased"]
    
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      # Goal tolerance for planning
      tolerance: 0.40
      # false = Dijkstra algorithm Nav planning
      use_astar: false
      # Allow planning through unknown map space (requires good obstacle detection)
      allow_unknown: true

# Controller server follows a planned path and produces velocity commands
controller_server:
  ros__parameters:
    # Topics and frequencies
    use_sim_time: false
    controller_frequency: 8.0
    odom_topic: "/odometry/filtered"

    # ignore tiny velocity values below thresholds
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.01
    
    failure_tolerance: 0.5

    # Plugins used for goals and pathing
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    
    # Checks if robot is making progress
    progress_checker:
      plugin: "nav2_controller::PoseProgressChecker"
      required_movement_radius: 0.01
      required_movement_angle: 0.08
      movement_time_allowance: 20.0

    # Determines if goal is reached
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      # Tolerance of how far away from goal robot can be
      xy_goal_tolerance: 0.12
      yaw_goal_tolerance: 0.25

    # Local path following controller
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      desired_linear_vel: 0.08
      min_approach_linear_velocity: 0.03
      approach_velocity_scaling_dist: 0.15

      # Lookahead distance controls how far ahead robot tracks the path
      lookahead_dist: 0.12
      min_lookahead_dist: 0.08
      max_lookahead_dist: 0.16
      # lookahead_time: 1.0
      use_velocity_scaled_lookahead_dist: false

      rotate_to_heading_angular_vel: 1.8
      # this tells robot alignment allowance for path
      # increase for more flexibility
      rotate_to_heading_min_angle: 0.25
      use_rotate_to_heading: true
      max_angular_accel: 3.0
      # transform_tolerance: 0.5

      # Colission checking needed for obstacle avoidance
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 0.08

      # Speed regulation options
      use_regulated_linear_velocity_scaling: false
      use_cost_regulated_linear_velocity_scaling: false
      allow_reversing: false

      regulated_linear_scaling_min_radius: 0.10
      regulated_linear_scaling_min_speed: 0.03

# Local costmap is a small rolloing map around the robot which is needed for obstacle avoidance
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      transform_tolerance: 0.6
      initial_transform_timeout: 60.0
      
      global_frame: "odom"
      robot_base_frame: "base_link"
      
      update_frequency: 8.0
      publish_frequency: 4.0

      # True = costmap moves with robot
      rolling_window: true
      width: 2
      height: 2
      resolution: 0.03

      # The robots size in meters may need to be adjusted further depending on room size
      footprint: "[[0.09, 0.09], [0.09, -0.09], [-0.09, -0.09], [-0.09, 0.09]]"
      footprint_padding: 0.005
      
      always_send_full_costmap: true
      plugins: ["obstacle_layer", "inflation_layer"]

      # Uses lidar data to detect obstacles
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        tf_filter_tolerance: 0.2

        # Lidar parameters
        scan:
          topic: "/scan"
          data_type: "LaserScan"
          clearing: true
          marking: true
          min_obstacle_height: 0.0
          max_obstacle_height: 0.30
          obstacle_max_range: 1.5
          raytrace_max_range: 2.0
          obstacle_min_range: 0.08
          raytrace_min_range: 0.08
          inf_is_valid: false
          observation_persistence: 0.0
          expected_update_rate: 0.0

      # Expands obstacles
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.08
        cost_scaling_factor: 5.0

# Global costmap  is the larger map used for long distance planning
# Combines both saved map, detected obstacles, and inflated saftety zones
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false

      # Allow delay for TF transforms
      transform_tolerance: 0.6
      # Time to wait for transformations at startup
      initial_transform_timeout: 60.0

      # Global referance frame
      global_frame: "map"
      # Robot body frame
      robot_base_frame: "base_link"
      
      # Frequencies of updates and publishes
      update_frequency: 4.0
      publish_frequency: 2.0

      # Size of each map cell in meters 5 cm seems to work well so far
      resolution: 0.05

      # Size of robot in meters
      footprint: "[[0.09, 0.09], [0.09, -0.09], [-0.09, -0.09], [-0.09, 0.09]]"
      # Padding adds to robot size tweak this if robot is running into obstacles in a different size room
      footprint_padding: 0.005

      # Keep unknown map areas as unknown
      track_unknown_space: true
      # Publish full costmap not just updates
      always_send_full_costmap: true
      
      # Layers that build the costmap
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      # Static layer uses the saved map from map_server
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      # Obstacle layer adds live obstacle detection to the global costmap
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        
        scan:
          # Lidar scan topic
          topic: "/scan"
          data_type: "LaserScan"
          # Clear free space using lidar rays
          clearing: true
          # Mark detected objects as obstacles
          marking: true

          # Ignore obstacles below or above these heights
          # Using 2D lidar so not needed
          min_obstacle_height: 0.0
          max_obstacle_height: 0.30

          # Max distance to mark obstacles in meters
          obstacle_max_range: 1.5
          # Max distance to clear free space
          raytrace_max_range: 2.0
          # Ignore obstacles this close to lidar
          obstacle_min_range: 0.08
          # Ignore free space this close to lidar
          raytrace_min_range: 0.08

          # False = infinite lidar reedings are not valid
          inf_is_valid: false
          # Do not keep old obstacles readings on map update if you would like them to stay
          observation_persistence: 0.0
          # Do not require a fixed scan update rate
          expected_update_rate: 0.0

      # Inflation layer expands obstacles size outward
      # Allows robot to maintain a safe distance from obstacles
      # Tune lower if phantom obstacles detected
      # Tune higher if robot is running into obstacles
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.10
        cost_scaling_factor: 4.0

# Behavior server handles recovery behavioors when navigation is stuck
# Handles spinning backing up and waiting
behavior_server:
  ros__parameters:
  
    use_sim_time: false
    
    cycle_frequency: 4.0
    
    local_frame: "odom"
    global_frame: "map"
    robot_base_frame: "base_link"
    
    # Costmaps and footprints used by recovery behaviors
    local_costmap_topic: "local_costmap/costmap_raw"
    global_costmap_topic: "global_costmap/costmap_raw"
    local_footprint_topic: "local_costmap/published_footprint"
    global_footprint_topic: "global_costmap/published_footprint"

    # TF tolerance for behavior calculations
    transform_tolerance: 0.6
    # How far ahead to simulate motion
    simulate_ahead_time: 0.8

    # Max and min rotation speed and accelleration
    max_rotational_vel: 0.85
    min_rotational_vel: 0.20
    rotational_acc_lim: 2.5

    # Recovery behavior plugins used
    behavior_plugins: ["spin", "backup", "wait"]

    # Spin rotates robot in place to recover or reorient
    spin:
      plugin: "nav2_behaviors::Spin"
      simulate_ahead_time: 0.2
      max_rotational_vel: 1.8
      min_rotational_vel: 1.1
      rotational_acc_lim: 3.0

    # Back up moves robot backwards to recover
    backup:
      plugin: "nav2_behaviors::BackUp"

    # Wait pauses navigation while calculating path or waiting for obstacle to move
    wait:
      plugin: "nav2_behaviors::Wait"

# Behavior tree navigator coordinates navigation process using a tree
# Planning, path following, replanning, and recovery
bt_navigator:
  ros__parameters:
  
    use_sim_time: false
    
    global_frame: "map"
    robot_base_frame: "base_link"
    odom_topic: "/odometry/filtered"

    # Behavior tree tick period (ms)
    bt_loop_duration: 10
    # Timeout for calls
    default_server_timeout: 20
    # Time to wait for services
    wait_for_service_timeout: 1000
    
    # Custom behavior tree file used
    default_bt_xml_filename: "/home/ubuntu/ros2_ws/src/rover_bringup/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"

    # Action types used
    navigators: ["navigate_to_pose", "navigate_through_poses"]

    # navigate to one goal pose
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"

    # Navigate using waypoints
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

# Waypoint follower can use a list of waypoints one after another
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 10
    stop_on_failure: true

# Localization lifestyle manager autimatically starts and managers localization nodes
lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      # Provides map
      - map_server
      # Provides position in map
      - amcl

@ Navigation lifestyle manager automatically starts and manages navigation nodes
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      # Creates global path
      - planner_server
      # Follows path and outputs cmd_vel
      - controller_server
      # Runs recovery behaviors
      - behavior_server
      # Coordinates navigation behavior tree
      - bt_navigator
      # Handles waypoint missions (Not currently used)
      - waypoint_follower
